name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenChanger
          path: bin/Release/net8.0-windows/win-x64/publish/ScreenChanger.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net8.0-windows/win-x64/publish/ScreenChanger.exe
          generate_release_notes: true
